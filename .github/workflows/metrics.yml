name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate terminal metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: luqingjia
          template: terminal
          filename: metrics.terminal.svg
          base: header, metadata
      - name: Generate recently starred metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: luqingjia
          filename: metrics.plugin.stars.svg
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4
      - name: Generate star lists languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: luqingjia
          filename: metrics.plugin.starlists.languages.svg
          base: ""
          plugin_starlists: yes
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 10
          plugin_starlists_limit_repositories: 0
          plugin_starlists_only: Middleware
